<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-box">
        <img src="logo/peoplesoft.png" alt="SoftPeople Logo">
      </div>
      <div class="header-text">
        <h2 class="primary-color">SoftPeople</h2>
        <p class="subtitle">HR Management</p>
      </div>
    </div>
    
    <nav class="sidebar-nav">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item">
        <lucide-icon name="LayoutDashboard"></lucide-icon> Dashboard
      </a>
      <a routerLink="/org-hierarchy" routerLinkActive="active" class="nav-item">
        <lucide-icon name="Network"></lucide-icon> Org Hierarchy
      </a>
      <a routerLink="/hr-policies" routerLinkActive="active" class="nav-item">
        <lucide-icon name="FileText"></lucide-icon> HR Policies
      </a>
      <a routerLink="/holiday-calendar" routerLinkActive="active" class="nav-item">
        <lucide-icon name="Calendar"></lucide-icon> Holiday Calendar
      </a>
      <div class="nav-divider"></div>
      <p class="nav-label">Management</p>
      <a routerLink="/interns" routerLinkActive="active" class="nav-item">
        <lucide-icon name="Users"></lucide-icon> Manage Employee
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-profile">
        <div class="user-avatar">AD</div>
        <div class="user-info">
          <p class="user-name">Admin User</p>
          <p class="user-role">HR Specialist</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <header class="top-bar">
      <div class="search-container">
        <lucide-icon name="Search" class="search-icon"></lucide-icon>
        <input type="text" placeholder="Search for employees, interns, or documents...">
      </div>
      <div class="top-actions">
        <button class="icon-btn" title="Notifications">
          <lucide-icon name="Bell"></lucide-icon>
          <span class="dot"></span>
        </button>
        <button class="icon-btn" title="Messages">
          <lucide-icon name="Mail"></lucide-icon>
        </button>
        <button class="btn-primary">
          <lucide-icon name="Plus"></lucide-icon> Add New
        </button>
      </div>
    </header>

    <div class="main-outlet-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
