<div class="page-header">
  <div class="header-content">
    <div class="breadcrumb">
      <a routerLink="/employees" class="back-link">
        <lucide-icon name="ArrowLeft"></lucide-icon> Back to List
      </a>
    </div>
    <h1>Add New Employee</h1>
    <p>Register a new employee into the system</p>
  </div>
</div>

<div class="data-container">
  <div class="card form-card">
    <form (ngSubmit)="saveEmployee()" #employeeForm="ngForm">
      <div class="form-grid">
        <!-- Personal Details -->
        <div class="form-section">
          <h3>Personal Details</h3>
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" [(ngModel)]="employee.fullName" name="fullName" required placeholder="Jane Doe">
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" [(ngModel)]="employee.email" name="email" required placeholder="jane@example.com">
          </div>
          <div class="form-group">
            <label>Phone Number *</label>
            <input type="text" [(ngModel)]="employee.phone" name="phone" required placeholder="+91 ...">
          </div>
          <div class="form-group">
            <label>Address</label>
            <input type="text" [(ngModel)]="employee.address" name="address" placeholder="Residential Address">
          </div>
        </div>

        <!-- Employment Details -->
        <div class="form-section">
          <h3>Employment Configuration</h3>
          <div class="form-group">
            <label>Department</label>
            <input type="text" [(ngModel)]="employee.department" name="department" placeholder="Engineering, HR, etc.">
          </div>
          <div class="form-group">
            <label>Designation / Position</label>
            <input type="text" [(ngModel)]="employee.designation" name="designation" placeholder="Senior Developer">
          </div>
          <div class="form-group">
            <label>Onboarding Date</label>
            <input type="date" [(ngModel)]="employee.onboardingDate" name="onboardingDate">
          </div>
          <div class="form-group">
            <label>System Role</label>
            <select [(ngModel)]="employee.role" name="role">
              <option value="Employee">Employee</option>
              <option value="Manager">Manager</option>
              <option value="Admin">Admin</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" routerLink="/employees">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="isSaving() || !employeeForm.valid">
          <lucide-icon name="Save" *ngIf="!isSaving()"></lucide-icon>
          <span *ngIf="!isSaving()">Register Employee</span>
          <span *ngIf="isSaving()">Saving...</span>
        </button>
      </div>
    </form>
  </div>
</div>
