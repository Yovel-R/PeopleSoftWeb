<div class="login-container">
  <div class="login-brand">
    <div class="logo-box">
      <i class="fa-solid fa-users-gear"></i>
    </div>
    <h1>Softrate HRM</h1>
    <p>Empowering your workforce</p>
  </div>

  <div class="login-card">
    <div class="login-tabs">
      <button type="button" [class.active]="loginType() === 'hr'" (click)="setLoginType('hr')">
        <i class="fa-solid fa-user-shield"></i>
        HR Portal
      </button>
      <button type="button" [class.active]="loginType() === 'employee'" (click)="setLoginType('employee')">
        <i class="fa-solid fa-user"></i>
        Employee
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
      <div class="form-header">
        <h2>{{ loginType() === 'hr' ? 'HR Login' : 'Employee Login' }}</h2>
        <p>Enter your credentials to continue</p>
      </div>

      <div class="error-banner" *ngIf="errorMessage()">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ errorMessage() }}
      </div>

      <div class="form-group" *ngIf="loginType() === 'hr'">
        <label>Email Address</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" [(ngModel)]="credentials.email" name="email" required placeholder="admin@softrate.com">
        </div>
      </div>

      <div class="form-group" *ngIf="loginType() === 'employee'">
        <label>Employee ID</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-id-card"></i>
          <input type="text" [(ngModel)]="credentials.employeeId" name="employeeId" required placeholder="STP2024001">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock"></i>
          <input type="password" [(ngModel)]="credentials.password" name="password" required placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="submit-btn" [disabled]="isLoading() || !loginForm.valid">
        <span *ngIf="!isLoading()">Login to Dashboard</span>
        <div class="spinner" *ngIf="isLoading()"></div>
      </button>

      <div class="form-footer">
        <a href="#">Forgot Password?</a>
      </div>
    </form>
  </div>
</div>
