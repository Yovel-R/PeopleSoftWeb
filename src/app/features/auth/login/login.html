<div class="login-container">
  <!-- Left Branding Panel -->
  <div class="branding-panel">
    <div class="logo-container">
      <div class="logo-text">Softrate <span>HRM</span></div>
    </div>
    <span class="crm-tag">Employee CRM</span>
    <h1>Sharp operational workspace for daily lead execution.</h1>
  </div>

  <!-- Right Form Panel -->
  <div class="form-panel">
    <div class="login-card">
      <div class="login-tabs">
        <button type="button" [class.active]="loginType() === 'hr'" (click)="setLoginType('hr')">
          HR Portal
        </button>
        <button type="button" [class.active]="loginType() === 'employee'" (click)="setLoginType('employee')">
          Employee
        </button>
      </div>

      <div class="form-header">
        <h2>{{ loginType() === 'hr' ? 'HR Access' : 'Employee Access' }}</h2>
        <p>Welcome back! Please enter your details.</p>
      </div>

      <div class="error-banner" *ngIf="errorMessage()">
        <i class="fa-solid fa-circle-exclamation"></i>
        {{ errorMessage() }}
      </div>

      <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <!-- HR Login Field -->
        <div class="form-group" *ngIf="loginType() === 'hr'">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <input 
              id="email"
              type="email" 
              [(ngModel)]="credentials.email" 
              name="email" 
              required 
              placeholder="e.g. admin@softrate.com">
          </div>
        </div>

        <!-- Employee Login Field -->
        <div class="form-group" *ngIf="loginType() === 'employee'">
          <label for="employeeId">Employee ID / Email</label>
          <div class="input-wrapper">
            <input 
              id="employeeId"
              type="text" 
              [(ngModel)]="credentials.employeeId" 
              name="employeeId" 
              required 
              placeholder="e.g. STP-1603-2026 or you@email.com">
          </div>
        </div>

        <!-- Password Field -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input 
              id="password"
              type="password" 
              [(ngModel)]="credentials.password" 
              name="password" 
              required 
              placeholder="Enter your password">
          </div>
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading() || !loginForm.valid">
          <span *ngIf="!isLoading()">Sign In</span>
          <div class="spinner" *ngIf="isLoading()"></div>
        </button>

        <div class="form-footer">
          <a routerLink="/register">Register Company</a>
          <a href="#">Forgot Password?</a>
        </div>
      </form>
    </div>
  </div>
</div>
