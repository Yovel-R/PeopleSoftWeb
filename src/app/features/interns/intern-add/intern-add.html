<div class="page-header">
  <div class="header-content">
    <div class="breadcrumb">
      <a routerLink="/interns" class="back-link">
        <lucide-icon name="ArrowLeft"></lucide-icon> Back to List
      </a>
    </div>
    <h1>Add New Intern</h1>
    <p>Register a new intern into the system</p>
  </div>
</div>

<div class="data-container">
  <div class="card form-card">
    <form (ngSubmit)="saveIntern()" #internForm="ngForm">
      <div class="form-grid">
        <!-- Personal Details -->
        <div class="form-section">
          <h3>Personal Details</h3>
          <div class="form-group">
            <label>Full Name *</label>
            <input type="text" [(ngModel)]="intern.fullName" name="fullName" required placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email Address *</label>
            <input type="email" [(ngModel)]="intern.email" name="email" required placeholder="john@example.com">
          </div>
          <div class="form-group">
            <label>Contact Number</label>
            <input type="text" [(ngModel)]="intern.contact" name="contact" placeholder="+91 ...">
          </div>
        </div>

        <!-- Academic Details -->
        <div class="form-section">
          <h3>Academic & Role</h3>
          <div class="form-group">
            <label>College / University</label>
            <input type="text" [(ngModel)]="intern.college" name="college" placeholder="University name">
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" [(ngModel)]="intern.department" name="department" placeholder="CS, IT, etc.">
          </div>
          <div class="form-group">
            <label>Assigned Role</label>
            <input type="text" [(ngModel)]="intern.role" name="role" placeholder="Web Developer, etc.">
          </div>
        </div>

        <!-- Internship Details -->
        <div class="form-section">
          <h3>Internship Configuration</h3>
          <div class="form-group">
            <label>Onboarding Date</label>
            <input type="date" [(ngModel)]="intern.onboardingDate" name="onboardingDate">
          </div>
          <div class="form-group">
            <label>Internship Type</label>
            <select [(ngModel)]="intern.internshipType" name="internshipType">
              <option value="Stipend">Stipend</option>
              <option value="Paid">Paid</option>
              <option value="Unpaid">Unpaid</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" routerLink="/interns">Cancel</button>
        <button type="submit" class="btn-primary" [disabled]="isSaving() || !internForm.valid">
          <lucide-icon name="Save" *ngIf="!isSaving()"></lucide-icon>
          <span *ngIf="!isSaving()">Register Intern</span>
          <span *ngIf="isSaving()">Saving...</span>
        </button>
      </div>
    </form>
  </div>
</div>
